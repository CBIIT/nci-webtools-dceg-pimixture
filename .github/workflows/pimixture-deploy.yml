name: Deploy PImiXture
on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Deploy environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy-pimixture:
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}
    env:
      APP: pimixture
      TZ: America/New_York
      AWS_REGION: us-east-1
      TASK_DEFINITION_TEMPLATE_PATH: .github/aws
      WEB_CONTAINER_PORT: 8220
      WORKER_CONTAINER_PORT: 8221
      TIER: ${{ inputs.tier }}
      IMAGE_TIER: ${{ contains(fromJson('["dev","qa"]'), inputs.tier) && 'development' || 'release' }}
      ECS_CPU_UNITS: "1 vCPU"
      ECS_MEMORY_UNITS: "2 GB"
      CICD_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd

    steps:
      - uses: "actions/checkout@v6.0.1"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ env.CICD_ROLE_ARN }}
          role-session-name: ${{ env.TIER }}-${{ env.APP }}-deploy-${{ github.ref_name }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set dynamic environment variables
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          REPO=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$APP
          echo "IMAGE_REPOSITORY=$REPO" >> $GITHUB_ENV
          echo "WEB_IMAGE=$REPO:$IMAGE_TIER-web-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "WORKER_IMAGE=$REPO:$IMAGE_TIER-worker-${{ github.ref_name }}-$TIMESTAMP" >> $GITHUB_ENV
          echo "WEB_IMAGE_LATEST=$REPO:$IMAGE_TIER-web-latest" >> $GITHUB_ENV
          echo "WORKER_IMAGE_LATEST=$REPO:$IMAGE_TIER-worker-latest" >> $GITHUB_ENV
          echo "PARAMETER_PATH=/analysistools/${TIER}/${APP}" >> $GITHUB_ENV
          echo "ENVIRONMENT_TIER=${TIER^^}" >> $GITHUB_ENV

      - name: Retrieve SSM parameters
        run: |
          PARAMETER_PATH="/analysistools/${TIER}/${APP}"
          
          # Retrieve parameters
          declare -A PARAMS=(
            ["ecs_cluster"]="ECS_CLUSTER"
            ["ecs_web_task"]="ECS_WEB_TASK"
            ["ecs_web_service"]="ECS_WEB_SERVICE"
            ["ecs_worker_task"]="ECS_WORKER_TASK"
            ["ecs_worker_service"]="ECS_WORKER_SERVICE"
            ["role_arn"]="ROLE_ARN"
          )
          
          for ssm_name in "${!PARAMS[@]}"; do
            env_var="${PARAMS[$ssm_name]}"
            value=$(aws ssm get-parameter \
              --name "${PARAMETER_PATH}/${ssm_name}" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text)
            echo "${env_var}=${value}" >> $GITHUB_ENV
            echo "Retrieved ${ssm_name} -> ${env_var}"
          done

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.0.1
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build and push web image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: docker/backend.docker
          pull: true
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}
            ${{ env.WEB_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:web-cache
          cache-to: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:web-cache,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: docker/worker.docker
          pull: true
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}
            ${{ env.WORKER_IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:worker-cache
          cache-to: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:worker-cache,mode=max

      - name: Render task definitions
        run: |
          envsubst < $TASK_DEFINITION_TEMPLATE_PATH/web.yml > web.yml
          envsubst < $TASK_DEFINITION_TEMPLATE_PATH/worker.yml > worker.yml
          
          echo "=== Web Task Definition ==="
          cat web.yml
          echo "=== Worker Task Definition ==="
          cat worker.yml

      - name: Register and deploy services
        run: |
          # Register task definitions
          aws ecs register-task-definition --cli-input-yaml file://web.yml
          aws ecs register-task-definition --cli-input-yaml file://worker.yml
          
          # Update services
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WEB_SERVICE }} \
            --task-definition ${{ env.ECS_WEB_TASK }} \
            --desired-count 1 \
            --force-new-deployment
          
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_WORKER_SERVICE }} \
            --task-definition ${{ env.ECS_WORKER_TASK }} \
            --desired-count 1 \
            --force-new-deployment

      - name: Deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.TIER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Image**: \`${{ env.WEB_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker Image**: \`${{ env.WORKER_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS Cluster**: ${{ env.ECS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Service**: ${{ env.ECS_WEB_SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker Service**: ${{ env.ECS_WORKER_SERVICE }}" >> $GITHUB_STEP_SUMMARY

